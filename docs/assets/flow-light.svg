<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#57606a"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8250df"/>
    </marker>
  </defs>

  <!-- ===== the channel (center) ===== -->
  <rect x="310" y="30" width="260" height="190" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="440" y="56" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">the channel</text>
  <text x="440" y="74" text-anchor="middle" font-size="12" fill="#57606a">two files in a shared directory</text>

  <rect x="330" y="88" width="220" height="52" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="440" y="110" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#0969da">CHANNEL.md</text>
  <text x="440" y="128" text-anchor="middle" font-size="11.5" fill="#57606a">append-only record — the hansard</text>

  <rect x="330" y="150" width="220" height="52" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="440" y="172" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#0969da">signal.json</text>
  <text x="440" y="190" text-anchor="middle" font-size="11.5" fill="#57606a">the doorbell — seq · turn · thread</text>

  <!-- ===== builder (left) ===== -->
  <rect x="40" y="80" width="200" height="70" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2328">builder agent</text>
  <text x="140" y="128" text-anchor="middle" font-size="12" fill="#57606a">any CLI-invocable harness</text>

  <!-- ===== reviewer (right) ===== -->
  <rect x="640" y="80" width="200" height="70" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="740" y="108" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2328">reviewer agent</text>
  <text x="740" y="128" text-anchor="middle" font-size="12" fill="#57606a">different vendor, on purpose</text>

  <!-- builder <-> channel -->
  <line x1="240" y1="100" x2="303" y2="100" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="92" text-anchor="middle" font-size="11.5" fill="#57606a">post</text>
  <line x1="303" y1="132" x2="240" y2="132" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="150" text-anchor="middle" font-size="11.5" fill="#57606a">read</text>

  <!-- reviewer <-> channel -->
  <line x1="640" y1="100" x2="577" y2="100" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="608" y="92" text-anchor="middle" font-size="11.5" fill="#57606a">post</text>
  <line x1="577" y1="132" x2="640" y2="132" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="608" y="150" text-anchor="middle" font-size="11.5" fill="#57606a">read</text>

  <!-- turn enforcement note -->
  <text x="440" y="240" text-anchor="middle" font-size="12" font-style="italic" fill="#57606a">one writer enforces the rules: turns, one open thread, caps</text>

  <!-- ===== watcher (bottom center) ===== -->
  <rect x="330" y="270" width="220" height="70" rx="10" fill="#fbf7ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="440" y="298" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2328">watcher</text>
  <text x="440" y="318" text-anchor="middle" font-size="12" fill="#57606a">dumb cron, every ~3 min</text>

  <!-- watcher polls doorbell -->
  <line x1="440" y1="270" x2="440" y2="253" stroke="#8250df" stroke-width="1.5" marker-end="url(#arrowAccent)"/>
  <text x="492" y="264" text-anchor="middle" font-size="11.5" fill="#8250df">polls the doorbell</text>

  <!-- watcher invokes agents (dashed) -->
  <path d="M 330 300 C 180 300 140 220 140 158" fill="none" stroke="#8250df" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowAccent)"/>
  <text x="204" y="268" text-anchor="middle" font-size="11.5" fill="#8250df">wakes whoever's</text>
  <text x="204" y="283" text-anchor="middle" font-size="11.5" fill="#8250df">turn it is</text>
  <path d="M 550 300 C 700 300 740 220 740 158" fill="none" stroke="#8250df" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowAccent)"/>
  <text x="676" y="268" text-anchor="middle" font-size="11.5" fill="#8250df">pinned prompt,</text>
  <text x="676" y="283" text-anchor="middle" font-size="11.5" fill="#8250df">debounced, once per seq</text>

  <!-- ===== supervisor (bottom, full width strip) ===== -->
  <rect x="40" y="380" width="800" height="40" rx="10" fill="#f0f7f0" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="440" y="405" text-anchor="middle" font-size="13.5" fill="#1f2328">
    <tspan font-weight="600">human supervisor</tspan> — every entry mirrored to them, merges are theirs, never the courier
  </text>

  <!-- watcher mirrors to supervisor -->
  <line x1="440" y1="340" x2="440" y2="373" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="486" y="362" text-anchor="middle" font-size="11.5" fill="#1a7f37">mirrors entries</text>
</svg>
